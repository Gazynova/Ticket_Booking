<div
  class="flex flex-col items-center justify-center min-h-screen bg-gradient-to-br from-gray-900 via-black to-gray-900 p-4">
  <div
    class="bg-white/10 backdrop-blur-md p-8 rounded-2xl shadow-2xl w-full max-w-sm border border-white/20 relative overflow-hidden">

    <div class="absolute top-0 left-0 w-24 h-24 bg-green-500/20 rounded-full blur-3xl -translate-x-10 -translate-y-10">
    </div>
    <div class="absolute bottom-0 right-0 w-32 h-32 bg-blue-500/20 rounded-full blur-3xl translate-x-10 translate-y-10">
    </div>

    <h2 class="text-3xl font-bold mb-2 text-center text-white relative z-10">Welcome Back</h2>
    <p class="text-gray-400 text-center mb-8 text-sm relative z-10">Please enter your details</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="relative z-10 space-y-5">
      <div>
        <label class="block text-gray-300 text-xs font-medium mb-1.5 pl-1 uppercase tracking-wider">Email
          Address</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
          <input formControlName="email" type="email" placeholder="name@company.com"
            class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-white placeholder-gray-500 transition-all font-light" />
        </div>
        <div *ngIf="submitted && f['email'].errors" class="text-red-400 text-xs mt-2 pl-1">
          <span *ngIf="f['email'].errors['required']">Email is required.</span>
          <span *ngIf="f['email'].errors['email']">Enter a valid email address.</span>
        </div>
      </div>

      <div>
        <label class="block text-gray-300 text-xs font-medium mb-1.5 pl-1 uppercase tracking-wider">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
          <input formControlName="password" type="password" placeholder="••••••••"
            class="w-full pl-10 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-white placeholder-gray-500 transition-all font-light" />
        </div>
        <div *ngIf="submitted && f['password'].errors" class="text-red-400 text-xs mt-2 pl-1">
          Password is required.
        </div>
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-500 hover:to-emerald-500 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all duration-200 mt-4 border border-white/10">
        Sign In
      </button>

      <p class="text-center text-gray-400 text-sm mt-6">
        Don't have an account? <a routerLink="/register"
          class="text-green-400 hover:text-green-300 font-medium transition-colors">Sign up</a>
      </p>
    </form>
  </div>
</div>
