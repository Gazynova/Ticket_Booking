<div class="min-h-screen bg-gradient-to-br from-gray-900 to-black flex items-center justify-center p-6">
  
  <!-- Back Button -->
  <button 
    (click)="goBack()" 
    class="absolute top-6 left-6 text-white/70 hover:text-white flex items-center space-x-2 transition-colors z-10">
    <i class="fas fa-arrow-left"></i>
    <span>Back to Events</span>
  </button>

  <div *ngIf="loading" class="text-white text-xl">Loading...</div>

  <div
    *ngIf="event && !loading"
    class="max-w-5xl w-full bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl overflow-hidden border border-white/20 flex flex-col md:flex-row"
  >
    <!-- Image Section -->
    <div class="md:w-1/2 h-96 md:h-auto relative group overflow-hidden">
      <img
        [src]="env.img + event.image"
        alt="{{ event.title }}"
        class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
      />
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent md:bg-gradient-to-r"></div>
    </div>

    <!-- Details Section -->
    <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center text-white relative">
      <span class="inline-block px-3 py-1 mb-4 text-xs font-semibold tracking-wider text-green-400 uppercase bg-green-400/10 rounded-full w-fit border border-green-400/20">
        {{ event.categoryName || 'Event' }}
      </span>

      <h1 class="text-4xl md:text-5xl font-bold mb-4 leading-tight">{{ event.title }}</h1>
      
      <div class="mb-6 space-y-2">
        <p class="text-gray-300 text-lg leading-relaxed">{{ event.description }}</p>
      </div>

      <div class="flex items-center justify-between mt-auto pt-6 border-t border-white/10">
        <div>
          <p class="text-sm text-gray-400 uppercase">Price per ticket</p>
          <p class="text-3xl font-bold text-green-400">₹ {{ event.price }}</p>
        </div>

        <app-generic-button
          label="Add to Cart"
          theme="primary"
          (clicked)="addToCart(event.id)"
          class="transform hover:scale-105 transition-transform"
        ></app-generic-button>
      </div>
    </div>
  </div>

  <div *ngIf="error" class="text-red-400 text-center bg-red-400/10 p-4 rounded-lg border border-red-400/20">
    {{ error }}
  </div>
</div>
