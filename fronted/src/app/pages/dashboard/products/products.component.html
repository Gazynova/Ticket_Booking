<button
  (click)="navigateToAddProduct()"
  class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-md mb-4"
>
  + Add New Product
</button>

<!-- Responsive Grid - Changes based on sidebar state -->
<div
  [ngClass]="{
    'grid gap-4 p-2': true,
    'grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5': isSidebarCollapsed,
    'grid-cols-1 sm:grid-cols-2 lg:grid-cols-3': !isSidebarCollapsed
  }"
>
  <div
    *ngFor="let product of filteredProducts"
    [ngClass]="{
      'relative bg-white/10 backdrop-blur-md rounded-xl shadow-lg hover:shadow-2xl hover:scale-105 transition-all duration-300 ease-in-out border border-black/20 flex flex-col justify-end overflow-hidden': true,
      'h-72 sm:h-80': !isSidebarCollapsed,
      'h-64 sm:h-72 md:h-80': isSidebarCollapsed
    }"
    [ngStyle]="{
      'background-image': 'url(' + getFullImageUrl(product.image) + ')',
      'background-size': 'cover',
      'background-position': 'center'
    }"
  >
    <!-- Enhanced glassmorphism overlay -->
    <div 
      [ngClass]="{
        'backdrop-blur-3xl p-3 transition-all duration-300': true,
        'bg-black/50': true
      }"
    >
      <h3 class="text-lg font-bold text-white mb-0.5 truncate">{{ product.title }}</h3>
      <p class="text-base font-semibold text-green-400 mb-2">₹ {{ product.price }}</p>
      
      <!-- Buttons - Always Row for compactness -->
      <div class="flex flex-row gap-2">
        <app-generic-button
          label="Edit"
          theme="primary"
          (clicked)="modifyProduct(product.id)"
          class="flex-1 text-sm"
        ></app-generic-button>

        <app-generic-button
          label="Del"
          theme="danger"
          (clicked)="deleteProduct(product.id)"
          class="flex-none text-sm"
        ></app-generic-button>
      </div>
    </div>
  </div>
</div>
